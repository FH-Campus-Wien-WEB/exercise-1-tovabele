<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here - css zeug hier rein
        this doesnt work, ask why!  <link rel="stylesheet" href="./stylesheets/style.css" >
        */
        body {
            max-width: 50%;
            background-color: rgb(240,240,240);
            font-family: arial, sans-serif;
            font-size: 14px;
            margin: 10px;
        }
        /* Applies to all <h1>...</h1> elements. */

        ul#ratings {
            margin-left: 0px;
            margin-top: 30px;
            padding: 0px;
            max-width: 300px;
            text-align: right;
            list-style-position: inside;
        }

        ul#ratings li {
            margin-left: 0px;
            padding: 4px;
            display: inline;
            padding: 0px, 10px, 0px, 10px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font: larger, italic;
        }

        img {
            border-radius: 12px;
            max-width: 350px;
            max-height: 450px;
        }

        h1 {
            font-size: 35px;
            font-weight: normal;
            margin-top: 5px;
            margin-bottom: 0px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 700;
        }

        h2 {
            margin-bottom: 0px;
        }

        ul{
            margin: 0px;
        }

        li {
            margin-left: 20px;
        }

        ul#releaseList {
            margin-bottom: 20px;
            margin-top: 0px;
            padding-left: 0px;
            padding-top: 0px;
        }

        ul#releaseList li {
            margin-left: 0px;
            margin-right: 20px;
            display: inline;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font: larger, italic;
        }

        ul#genre {
            padding: 0px;
            max-width: 280px;
            margin-bottom: 40px;
            margin-left: 0px;
            list-style-position: inside;
        }

        ul#genre li {
            margin-left: 0px;
            display: inline;
            padding: 8px;
            background: linear-gradient(180deg,rgba(0,0,0, 0) 20%, #ffd80020 100%);
            border-radius: 12px;
            border: 2px solid #666666;
            margin: 0 4px 0;
            font: large, bold; /* doesn't work? */
        }


        ul {
            padding: 10px;
        }


    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        function generateUnorderedList(body, heading, items) {
            const listHeading = document.createElement('h2')
            listHeading.textContent = heading + ((items.length === 1) ? ":" : "s:") //postfix
            body.append(listHeading)

            let unorderedList = document.createElement('ul')
            body.append(unorderedList)
                        
            items.forEach(item => {
                let li = document.createElement('li')
                li.textContent = item
                unorderedList.appendChild(li)
            })
        }

        function interpretJSON(j) {
            const data = JSON.parse(j);
            const body = document.body;

         
            //looping through the json movie objects
            data.forEach(item => {
                const ratingList = document.createElement('ul')
                ratingList.id = "ratings"
                body.append(ratingList)
                
                const poster = document.createElement('img')
                body.append(poster)
                poster.src = item.Poster

                const header = document.createElement('h1')
                body.append(header)
                header.innerText = item.Title

                const releaseList = document.createElement('ul')
                    releaseList.id = "releaseList"
                    body.append(releaseList)

                    const runtime = document.createElement('li')
                    const hours = Math.floor(item.Runtime / 60)
                    const mins = item.Runtime % 60
                    runtime.textContent = 'Runtime: ' + hours + 'h ' + mins + 'm'
                    releaseList.append(runtime)

                    const releasedOn = document.createElement('li')
                    releasedOn.textContent = 'Released on ' + item.Released
                    releaseList.append(releasedOn)

                const genreList = document.createElement('ul')
                    genreList.id = "genre"
                    body.append(genreList)
                    item.Genres.forEach(genre => {
                        let li = document.createElement('li')
                        li.textContent = genre
                        genreList.appendChild(li)
                    })

                generateUnorderedList(body, "Director", item.Directors)
                generateUnorderedList(body, "Writer", item.Writers)
                generateUnorderedList(body, "Actor", item.Actors)

                const plot = document.createElement('div')
                    plot.textContent = item.Plot
                    body.append(plot)
                

                const metascore = document.createElement('li')
                metascore.textContent = 'Metacritics: ' + item.Metascore + '%'
                ratingList.append(metascore)

                const imdbrating = document.createElement('li')
                imdbrating.textContent = 'IMDB: ' + item.imdbRating + '/10'
                ratingList.append(imdbrating)

                // loop through any other key words
                for (let key in item) {
                    switch (key) {
                        case 'Title':
                            break
                        case 'Released':
                            break
                        case 'Runtime':
                            break
                        case 'Genres':
                            break
                        case 'Directors':
                            break
                        case 'Writers':
                            break
                        case 'Actors':
                            break
                        case 'Plot':
                            break
                        case 'Poster':
                            break
                        case 'Metascore':
                            break
                        case 'imdbRating':
                            break
                        default:
                            const paragraph = document.createElement('p')
                            paragraph.innerText = key + ': ' + item[key]
                            body.append(paragraph)
                    }
                }
            })
            return body
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body 
                    - In server/files/index.html, parse the JSON returned by the server, 
                    - loop over the movie array, and 
                    - dynamically create semantic HTML elements that display all required movie information. 
                    - Append the created elements to the page body.
                    bodyElement.append(reverseString(xhr.responseText))
                    */ 
                    bodyElement.append(interpretJSON(xhr.responseText))
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>
