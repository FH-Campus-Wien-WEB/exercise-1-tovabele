<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
        /* Part 3: Your styling goes here - css zeug hier rein
        this doesnt work, ask why!  <link rel="stylesheet" href="./stylesheets/style.css" >
        */
        body {
            margin: 25px;
            background-color: rgb(240,240,240);
            font-family: arial, sans-serif;
            font-size: 14px;
        }
        /* Applies to all <h1>...</h1> elements. */
        h1 {
            font-size: 35px;
            font-weight: normal;
            margin-top: 5px;
        }
        /* Applies to all elements with <... class="someclass"> specified. 
        .someclass {
            color: red;
        }
        */

    </style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        function generateUnorderedList(body, heading, items) {
            const listHeading = document.createElement('h2')
            listHeading.textContent = heading
            body.append(listHeading)

            let unorderedList = document.createElement('ul')
            body.append(unorderedList)
                        
            items.forEach(item => {
                let li = document.createElement('li')
                li.textContent = item
                unorderedList.appendChild(li)
            })
        }

        function interpretJSON(j) {
            const data = JSON.parse(j);
            const body = document.body;
           
            //looping through the json movie objects
            data.forEach(item => {
                // loop through the key words
                for (let key in item) {
                    switch (key) {
                        case 'Title':
                            const header = document.createElement('h1')
                            header.innerText = item[key]
                            body.append(header)
                            console.log("ich bin im " + key);
                            console.log(item[key]);
                            break;
                        case 'Runtime':
                            const runtime = document.createElement('div')
                            const time = item[key]
                            const hours = Math.floor(time / 60)
                            const mins = time % 60
                            runtime.textContent = 'Runtime: ' + hours + 'h ' + mins + 'm'
                            body.append(runtime)
                            break;
                        case 'Released':
                            const released = document.createElement('div')
                            const date = item[key]
                            released.textContent = 'Released on ' + date
                            body.append(released)
                            break;
                        case 'Genres':
                            const genre = document.createElement('div')
                            genre.textContent = item[key]
                            body.append(genre)
                            break;
                        case 'Directors':
                            generateUnorderedList(body, "Director:", item[key])
                            break;
                        case 'Writers':
                            generateUnorderedList(body, "Writer:", item[key])
                            break;
                        case 'Actors':
                            generateUnorderedList(body, "Actor:", item[key])
                            break;
                        case 'Plot':
                            const plot = document.createElement('div')
                            plot.textContent = item[key]
                            body.append(plot)
                            break;
                        case 'Metascore':
                            const metascore = document.createElement('div')
                            metascore.textContent = '' + metascore
                            body.append(metascore)
                            break;
                        case 'Poster':
                            const poster = document.createElement('div')
                            poster.textContent = '' + poster
                            body.append(poster)
                            break;
                        case 'imdbRating':
                            const imdbrating = document.createElement('div')
                            imdbrating.textContent = '' + imdbrating
                            body.append(imdbrating)
                            break;
                        default:
                            const paragraph = document.createElement('p')
                            paragraph.innerText = item[key]
                            body.append(paragraph)
                    }
                        
                    
                }

            })
            return body
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {
		            /* Part 2: Build the HTML elements here and append them to the body 
                    - In server/files/index.html, parse the JSON returned by the server, 
                    - loop over the movie array, and 
                    - dynamically create semantic HTML elements that display all required movie information. 
                    - Append the created elements to the page body.
                    bodyElement.append(reverseString(xhr.responseText))
                    */ 
                    bodyElement.append(interpretJSON(xhr.responseText))
                } else {
                    bodyElement.append("Daten konnten nicht geladen werden, Status " + xhr.status + " - " + xhr.statusText)
                }
            }
            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>
